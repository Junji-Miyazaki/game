<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AbyssGenesis — 進化シム・プロトタイプ v10</title>
<style>
  :root{--ink:#e8f4f1;--ink-dim:#7fa6a6;--ink-faint:#456a6a;--teal:#2ee6a6;--teal-d:#0f6e56;--coral:#ff7a4d;--coral-d:#993c1d;--gold:#f5c451;--gold-d:#854f0b;--line:rgba(255,255,255,.08);--mono:ui-monospace,SFMono-Regular,Menlo,monospace;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:radial-gradient(120% 80% at 50% 0%,#0a2530 0%,#04141a 70%);color:var(--ink);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;display:flex;justify-content:center;}
  #app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);}
  .turn{font-family:var(--mono);font-size:13px;color:var(--ink-dim);}
  .envchips{display:flex;gap:6px;margin-left:auto;}
  .chip{font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-dim);background:transparent;cursor:pointer;white-space:nowrap;}
  .chip.on{background:rgba(46,230,166,.14);color:var(--teal);border-color:rgba(46,230,166,.4);}
  .tenkei{padding:8px 14px;border-bottom:1px solid var(--line);}
  .tenkei .row{display:flex;justify-content:space-between;font-size:11px;color:var(--gold);margin-bottom:4px;}
  .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;transition:width .5s ease;}
  .burstbtn{margin-top:8px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--gold-d);background:rgba(245,196,81,.12);color:var(--gold);font-size:13px;cursor:pointer;display:none;}
  .burstbtn.ready{display:block;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .stage{position:relative;flex:1;min-height:280px;overflow:hidden;background:radial-gradient(160% 140% at 50% 30%,#0c3340 0%,#06202a 60%,#04141a 100%);touch-action:manipulation;}
  #world{position:absolute;left:0;top:0;transform-origin:0 0;transition:transform .45s ease;}
  .crit{position:absolute;left:0;top:0;transform-origin:center;will-change:transform;}
  .crit .body{display:block;position:relative;width:100%;height:100%;transform-origin:center;}
  .crit .detail{position:absolute;left:0;top:0;width:100%;height:100%;display:block;overflow:visible;}
  .crit .detail svg{width:100%;height:100%;display:block;}
  .crit.sel .body{outline:1.5px solid #fff;outline-offset:2px;border-radius:4px;}
  .corpse{position:absolute;left:0;top:0;border-radius:40%;background:#42585a;pointer-events:none;}
  @keyframes born{from{transform:scale(0)}to{transform:scale(1)}}
  @keyframes happy{0%,100%{transform:scale(1)}45%{transform:scale(1.4)}}
  @keyframes flinch{0%,100%{transform:scale(1)}25%{transform:scale(.6)}}
  @keyframes munch{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
  .body.born{animation:born .4s ease;} .body.happy{animation:happy .6s ease;} .body.flinch{animation:flinch .5s ease;} .body.munch{animation:munch .26s ease;}
  .grid{position:absolute;inset:0;z-index:4;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
  .grid.hide{display:none;}
  .gcell{border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-faint);font-size:12px;font-family:var(--mono);}
  .gcell:hover{background:rgba(46,230,166,.06);border-color:rgba(46,230,166,.3);}
  .gcell .gn{background:#0a2530cc;border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
  .gcell .gn.live{color:var(--teal);border-color:rgba(46,230,166,.3);}
  .camback{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:9;font-size:11px;color:var(--ink-dim);background:#0a2530;border:1px solid var(--line);border-radius:999px;padding:5px 12px;cursor:pointer;display:none;align-items:center;gap:5px;}
  .camback.show{display:flex;}
  .camhint{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-faint);pointer-events:none;z-index:4;}
  .fx{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:5;}
  .fx.bless{background:radial-gradient(circle at 50% 45%,rgba(46,230,166,.40),transparent 62%);}
  .fx.trial{background:radial-gradient(circle at 50% 45%,rgba(255,70,50,.42),transparent 72%);}
  @keyframes flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}} .fx.go{animation:flash .8s ease-out;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
  .stage.shake{animation:shake .4s;}
  .toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#0a2530;border:1px solid var(--coral-d);color:#ffb59a;padding:7px 14px;border-radius:999px;font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:92%;z-index:8;}
  .toast.show{opacity:1;} .toast.win{border-color:var(--teal-d);color:#9af0cf;} .toast.bad{border-color:var(--gold-d);color:var(--gold);}
  .eco{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:var(--ink-faint);font-family:var(--mono);pointer-events:none;z-index:4;}
  .logbtn{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:#0a2530;color:var(--ink-dim);cursor:pointer;font-size:15px;z-index:7;}
  .zukan{position:absolute;top:12px;left:12px;font-size:12px;color:var(--ink-dim);background:#0a2530;border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;z-index:7;}
  .inspect{position:absolute;left:10px;right:10px;bottom:26px;background:#0a2530ee;border:1px solid var(--line);border-radius:12px;padding:9px 12px;display:none;z-index:7;}
  .inspect.show{display:block;}
  .inspect .ihead{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;}
  .inspect .dot{width:14px;height:14px;border-radius:50%;flex:none;} .inspect .ix{margin-left:auto;color:var(--ink-faint);cursor:pointer;}
  .inspect .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);margin-top:5px;display:flex;justify-content:space-between;}
  .hpbar{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;} .hpbar i{display:block;height:100%;}
  .gauges{padding:10px 14px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--line);}
  .g .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;} .g .name{color:var(--ink-dim);} .g .val{font-family:var(--mono);}
  .g.iron{opacity:.45;} .g.iron.live{opacity:1;}
  .energy{display:flex;align-items:center;gap:8px;padding:2px 14px 0;font-size:12px;color:var(--ink-dim);}
  .pips{display:flex;gap:4px;} .pip{width:13px;height:13px;border-radius:50%;border:1px solid var(--gold-d);} .pip.on{background:var(--gold);}
  .actions{display:flex;gap:10px;padding:10px 14px 16px;}
  .act{flex:1;padding:15px 0;border-radius:12px;font-size:15px;cursor:pointer;border:1px solid;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;user-select:none;}
  .act small{font-size:10px;color:var(--ink-faint);}
  .act.bless{border-color:rgba(46,230,166,.45);color:var(--teal);} .act.bless:active{background:rgba(46,230,166,.12);}
  .act.trial{border-color:rgba(255,122,77,.45);color:var(--coral);} .act.trial:active{background:rgba(255,122,77,.12);}
  .act.no{opacity:.35;}
  .panel{position:fixed;inset:0;background:rgba(2,10,14,.72);display:none;align-items:flex-end;justify-content:center;z-index:20;}
  .panel.open{display:flex;}
  .sheet{width:100%;max-width:430px;background:#0a2530;border-top:1px solid var(--line);border-radius:18px 18px 0 0;max-height:78vh;display:flex;flex-direction:column;}
  .sheet h3{margin:0;padding:14px 16px;font-size:14px;font-weight:500;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;} .sheet h3 span{color:var(--ink-faint);cursor:pointer;font-size:18px;}
  .formula{padding:11px 16px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--ink-dim);background:rgba(255,255,255,.02);} .formula b{color:var(--teal);} .formula .eq{color:var(--ink);}
  .sheetbody{padding:12px 16px;overflow:auto;}
  #log{font-family:var(--mono);font-size:11.5px;line-height:1.7;color:var(--ink-dim);} #log .gd{color:var(--teal);} #log .wn{color:var(--gold);} #log .bd{color:var(--coral);}
  .zgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .cell{aspect-ratio:1;border-radius:10px;background:#0a2530;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:10px;color:var(--ink-dim);text-align:center;}
  .cell.undisc{color:var(--ink-faint);} .cell.rare{border:2px solid var(--gold);background:rgba(245,196,81,.1);color:var(--gold);} .cell.ext{opacity:.4;} .cell .n{font-family:var(--mono);font-size:9px;}
  .cell svg{display:block;width:34px;height:34px;}
  .cell.undisc .sil{filter:brightness(0);opacity:.5;display:flex;}
  .cell .hint{font-family:var(--mono);font-size:8px;color:var(--ink-faint);line-height:1.25;}
  .mission{display:flex;align-items:center;gap:9px;padding:7px 14px;border-bottom:1px solid var(--line);font-size:12px;}
  .mission .mi{flex:none;}
  .mission .mtxt{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mission .mrw{margin-left:auto;font-size:10.5px;color:var(--gold);white-space:nowrap;flex:none;}
  .mission.done{animation:mdone .9s ease;}
  @keyframes mdone{0%{background:rgba(46,230,166,0)}40%{background:rgba(46,230,166,.28)}100%{background:rgba(46,230,166,0)}}
  .g.vit.danger .name{color:var(--coral);}
  .g.vit.danger{animation:pulse 1s infinite;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><span class="turn" id="turn">ターン 0</span><div class="envchips" id="envchips"></div></div>
  <div class="tenkei">
    <div class="row"><span>✦ 天啓ゲージ（豊かな生態系で蓄積）</span><span id="tkval">0%</span></div>
    <div class="bar"><i id="tkbar" style="background:var(--gold)"></i></div>
    <button class="burstbtn" id="burst">✦ 天啓発動 — 一斉進化を促す</button>
  </div>
  <div class="mission" id="missionBar"><span class="mi">🎯</span><span class="mtxt" id="mtxt">—</span><span class="mrw" id="mrw"></span></div>
  <div class="stage" id="stage">
    <div id="world"></div>
    <div class="grid" id="grid"></div>
    <div class="fx bless" id="fxBless"></div><div class="fx trial" id="fxTrial"></div>
    <button class="zukan" id="openZukan">図鑑 <b id="zcount">0</b>/6</button>
    <button class="logbtn" id="openLog">⚗</button>
    <button class="camback" id="camback">⤢ 広角ビュー</button>
    <div class="camhint" id="camhint">区画をタップで拡大</div>
    <div class="toast" id="toast"></div>
    <div class="inspect" id="inspect">
      <div class="ihead"><span class="dot" id="iDot"></span><b id="iName"></b><span class="ix" id="iClose">×</span></div>
      <div class="hpbar"><i id="iHp"></i></div>
      <div class="meta"><span id="iAge"></span><span id="iState"></span></div>
    </div>
    <div class="eco" id="eco">海が目覚めた</div>
  </div>
  <div class="gauges">
    <div class="g"><div class="lab"><span class="name">光エネルギー</span><span class="val" id="lightV" style="color:var(--teal)">0</span></div><div class="bar"><i id="lightB" style="background:var(--teal)"></i></div></div>
    <div class="g"><div class="lab"><span class="name">変異圧</span><span class="val" id="mutV" style="color:var(--coral)">0</span></div><div class="bar"><i id="mutB" style="background:var(--coral)"></i></div></div>
    <div class="g iron" id="ironG"><div class="lab"><span class="name" id="ironName">未知の寄与 ?</span><span class="val" id="ironV" style="color:var(--ink-dim)">?</span></div><div class="bar"><i id="ironB" style="background:var(--ink-dim)"></i></div></div>
    <div class="g vit" id="vitG"><div class="lab"><span class="name">生命力（生態系の安定）</span><span class="val" id="vitV" style="color:var(--teal)">60</span></div><div class="bar"><i id="vitB" style="background:var(--teal)"></i></div></div>
  </div>
  <div class="energy"><span>神力</span><div class="pips" id="pips"></div></div>
  <div class="actions">
    <button class="act bless" id="bless">☀ 恵み<small>光を強く注ぐ</small></button>
    <button class="act trial" id="trial">⚡ 試練<small>進化圧をかける</small></button>
  </div>
</div>
<div class="panel" id="logPanel"><div class="sheet"><h3>⚗ 研究ログ <span data-close>×</span></h3><div class="formula" id="formula"></div><div class="sheetbody"><div id="log"></div></div></div></div>
<div class="panel" id="zukanPanel"><div class="sheet"><h3>図鑑 <span data-close>×</span></h3><div class="sheetbody"><div class="zgrid" id="zgrid"></div></div></div></div>

<script>
const ENVS={warm:{label:'温・明・浅',light:2.0,pred:1.0},deep:{label:'温・明・深',light:1.2,pred:1.3},cold:{label:'冷・暗・深',light:0.3,pred:1.5}};
// dw/dh=詳細SVGの箱サイズ, sw/sh=広角簡略の図形サイズ, sr=簡略の角丸
const SP={
  proto:{name:'原始多細胞',role:'prod',color:'#5dcaa5',dw:16,dh:16,sw:9,sh:9,sr:'50%',life:[16,26],disc:true,ext:false,gate:null,refuge:true,cap:16,move:'brownian',base:11,sense:0},
  algae:{name:'緑藻',role:'prod',color:'#2ee6a6',dw:22,dh:26,sw:12,sh:12,sr:'50%',life:[18,30],disc:false,ext:false,gate:{g:'light',t:45,parent:'proto'},cap:30,move:'sway',base:4,sense:0},
  leaf:{name:'葉状藻',role:'prod',color:'#0f6e56',dw:30,dh:22,sw:20,sh:11,sr:'6px',life:[22,34],disc:false,ext:false,gate:{g:'light',t:80,parent:'algae'},cap:20,move:'sway',base:3,sense:0},
  swim:{name:'遊泳虫',role:'cons',diet:'prey',preys:['proto','algae'],color:'#ff7a4d',dw:30,dh:16,sw:18,sh:9,sr:'999px',life:[24,40],disc:false,ext:false,gate:{g:'mut',t:45,parent:'algae'},cap:18,move:'zigzag',base:26,hunt:76,sense:150},
  trilo:{name:'三葉虫',role:'cons',diet:'detritus',color:'#993c1d',dw:26,dh:26,sw:18,sh:18,sr:'50%',life:[28,46],disc:false,ext:false,gate:{g:'mut',t:70,parent:'swim'},cap:16,move:'crawl',base:12,hunt:24,sense:80},
  anomalo:{name:'アノマロカリス',role:'cons',diet:'prey',preys:['swim','trilo'],color:'#d85a30',dw:48,dh:24,sw:30,sh:12,sr:'999px',life:[32,52],disc:false,ext:false,gate:{g:'mut',t:90,parent:'swim'},cap:10,move:'cruise',base:15,hunt:98,sense:190},
};
const RARE={name:'黄金三葉虫',color:'#f5c451',dw:30,dh:30,sw:22,sh:22,sr:'50%',disc:false};
const ORDER=['proto','algae','leaf','swim','trilo','anomalo'];
const GCAP=92;
const S={turn:0,light:0,mut:0,iron:0,ironRev:false,tenkei:0,env:'warm',energy:5,emax:5,eregen:0,rare:false,lf:0.3,sel:null,pin:false,vit:60,combo:0,_comboT:null,missionIdx:0,peakSp:0,vitWarn:false,collapsing:false,vitLow:0};
let agents=[],corpses=[],vW=400,vH=280,WORLD_W=1200,WORLD_H=840,lastT=0;
let cam={mode:'wide',scale:1/3,ox:0,oy:0};
const $=id=>document.getElementById(id),clamp=v=>Math.max(0,Math.min(100,v)),R=v=>Math.round(v),ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1)),rf=(a,b)=>a+Math.random()*(b-a);

// 中間スタイルの詳細SVG（右向きで中心配置）
function svgFor(k,rare){const c=rare?RARE.color:SP[k].color;const dk={proto:'#3a9b7e',algae:'#0f6e56',leaf:'#063f30',swim:'#993c1d',trilo:'#712b13',anomalo:'#993c1d'}[k];const eye='#08323a';
 if(k==='proto')return `<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="${c}"/><circle cx="8" cy="8" r="3.2" fill="${dk}"/><circle cx="6" cy="6" r="1.4" fill="#d9fff0"/></svg>`;
 if(k==='algae')return `<svg viewBox="0 0 22 26"><line x1="11" y1="24" x2="11" y2="3" stroke="${dk}" stroke-width="2" stroke-linecap="round"/><g stroke="${c}" stroke-width="2.2" stroke-linecap="round" fill="none"><path d="M11 8 q-9 -2 -10 -8"/><path d="M11 4 q9 -1 11 -2"/><path d="M11 14 q-9 0 -10 4"/><path d="M11 18 q9 1 10 5"/></g><ellipse cx="2" cy="2" rx="2.6" ry="3.4" fill="${c}"/><ellipse cx="20" cy="3" rx="2.6" ry="3.4" fill="${c}"/></svg>`;
 if(k==='leaf')return `<svg viewBox="0 0 30 22"><path d="M3 11 Q15 1 27 11 Q15 21 3 11 Z" fill="${c}"/><path d="M3 11 Q15 5 27 11" fill="none" stroke="${dk}" stroke-width="1.2"/><line x1="6" y1="11" x2="24" y2="11" stroke="${dk}" stroke-width="0.8" opacity=".6"/></svg>`;
 if(k==='swim')return `<svg viewBox="0 0 30 16"><path d="M5 8 L0 4 L1 12 Z" fill="${dk}"/><ellipse cx="15" cy="8" rx="13" ry="6" fill="${c}"/><ellipse cx="13" cy="9.4" rx="9" ry="3.2" fill="#ffb59a"/><g stroke="${dk}" stroke-width="0.9" opacity=".5"><line x1="10" y1="3.5" x2="10" y2="12.5"/><line x1="15" y1="3" x2="15" y2="13"/><line x1="20" y1="3.5" x2="20" y2="12.5"/></g><circle cx="24" cy="6" r="2.3" fill="${eye}"/><circle cx="24.8" cy="5.2" r="0.8" fill="#fff"/></svg>`;
 if(k==='trilo')return `<svg viewBox="0 0 26 26"><ellipse cx="13" cy="13" rx="12" ry="13" fill="${c}"/><ellipse cx="13" cy="5.5" rx="12" ry="5.5" fill="#a8492a"/><ellipse cx="13" cy="13" rx="4" ry="12" fill="${dk}"/><g stroke="#5c2410" stroke-width="0.8" opacity=".7"><line x1="3" y1="11" x2="9" y2="11"/><line x1="17" y1="11" x2="23" y2="11"/><line x1="3" y1="15" x2="9" y2="15"/><line x1="17" y1="15" x2="23" y2="15"/><line x1="4" y1="19" x2="9" y2="19"/><line x1="17" y1="19" x2="22" y2="19"/></g><circle cx="9" cy="5" r="1.5" fill="${eye}"/><circle cx="17" cy="5" r="1.5" fill="${eye}"/></svg>`;
 if(k==='anomalo')return `<svg viewBox="0 0 48 24"><path d="M6 12 L0 6 L1 18 Z" fill="${dk}"/><ellipse cx="24" cy="12" rx="21" ry="7.5" fill="${c}"/><ellipse cx="22" cy="14" rx="15" ry="4" fill="#f0997b"/><g fill="${dk}"><ellipse cx="10" cy="19" rx="3.6" ry="2.2"/><ellipse cx="17" cy="20" rx="3.6" ry="2.2"/><ellipse cx="24" cy="20" rx="3.6" ry="2.2"/><ellipse cx="31" cy="20" rx="3.6" ry="2.2"/><ellipse cx="38" cy="19" rx="3.6" ry="2.2"/></g><path d="M44 9 q7 -2 6 -7" fill="none" stroke="${dk}" stroke-width="2" stroke-linecap="round"/><path d="M44 13 q8 0 9 5" fill="none" stroke="${dk}" stroke-width="2" stroke-linecap="round"/><circle cx="40" cy="8" r="2.4" fill="${eye}"/><circle cx="41" cy="7.2" r="0.8" fill="#fff"/></svg>`;
 return `<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="${c}"/></svg>`;
}

function dims(){vW=$('stage').clientWidth;vH=$('stage').clientHeight;WORLD_W=vW*3;WORLD_H=vH*3;const w=$('world');w.style.width=WORLD_W+'px';w.style.height=WORLD_H+'px';}
let gcells=[];
function buildGrid(){const g=$('grid');g.innerHTML='';gcells=[];for(let r=0;r<3;r++)for(let c=0;c<3;c++){const d=document.createElement('div');d.className='gcell';const n=document.createElement('span');n.className='gn';n.textContent='0';d.appendChild(n);d.onclick=ev=>{ev.stopPropagation();setZoom(c*vW,r*vH);};g.appendChild(d);gcells.push({el:d,n,r,c});}}
function updateGridCounts(){for(const gc of gcells){let cnt=0;const x0=gc.c*vW,x1=x0+vW,y0=gc.r*vH,y1=y0+vH;for(const a of agents)if(a.x>=x0&&a.x<x1&&a.y>=y0&&a.y<y1)cnt++;gc.n.textContent=cnt;gc.n.classList.toggle('live',cnt>0);}}
function clampOx(v){return Math.max(0,Math.min(Math.max(0,WORLD_W-vW),v));}
function clampOy(v){return Math.max(0,Math.min(Math.max(0,WORLD_H-vH),v));}
function applyCam(){$('world').style.transform='translate('+(-cam.ox*cam.scale)+'px,'+(-cam.oy*cam.scale)+'px) scale('+cam.scale+')';}
function setWide(){const w=$('world');w.style.transition='';cam={mode:'wide',scale:vW/WORLD_W,ox:0,oy:0};applyCam();w.classList.add('wide');$('grid').classList.remove('hide');$('camback').classList.remove('show');$('camhint').textContent='区画をタップで拡大';$('camhint').style.display='';updateGridCounts();clearSel();}
function setZoom(ox,oy){const w=$('world');w.style.transition='';cam={mode:'zoom',scale:1,ox:clampOx(ox),oy:clampOy(oy)};applyCam();w.classList.remove('wide');$('grid').classList.add('hide');$('camback').classList.add('show');$('camhint').textContent='ドラッグで移動 ・ ダブルタップで広角へ';$('camhint').style.display='';}
function panTo(ox,oy){if(cam.mode!=='zoom')return;$('world').style.transition='none';cam.ox=clampOx(ox);cam.oy=clampOy(oy);applyCam();}

function renderEnv(){const c=$('envchips');c.innerHTML='';for(const k in ENVS){const b=document.createElement('button');b.className='chip'+(S.env===k?' on':'');b.textContent=ENVS[k].label;b.onclick=()=>{S.env=k;renderEnv();flash('環境 → '+ENVS[k].label+'（光 ×'+ENVS[k].light+'）');};c.appendChild(b);}}
function pipsRender(){const p=$('pips');p.innerHTML='';for(let i=0;i<S.emax;i++){const d=document.createElement('div');d.className='pip'+(i<S.energy?' on':'');p.appendChild(d);}}
function countSp(k){let n=0;for(const a of agents)if(a.k===k)n++;return n;}
function aliveSpecies(){return ORDER.filter(k=>countSp(k)>0);}

// === ミッション（クエスト）===
const MISSIONS=[
  {t:'緑藻を進化させる',rw:'神力+1',ok:()=>SP.algae.disc,ap:()=>{S.emax=Math.min(9,S.emax+1);}},
  {t:'3種を共存させる',rw:'神力+1',ok:()=>aliveSpecies().length>=3,ap:()=>{S.emax=Math.min(9,S.emax+1);}},
  {t:'遊泳虫を進化させる',rw:'神力回復',ok:()=>SP.swim.disc,ap:()=>{S.energy=S.emax;}},
  {t:'総個体数を50にする',rw:'天啓+25%',ok:()=>agents.length>=50,ap:()=>{S.tenkei=clamp(S.tenkei+25);}},
  {t:'三葉虫を進化させる',rw:'神力+1',ok:()=>SP.trilo.disc,ap:()=>{S.emax=Math.min(9,S.emax+1);}},
  {t:'交絡［鉄分］を特定する',rw:'神力回復',ok:()=>S.ironRev,ap:()=>{S.energy=S.emax;}},
  {t:'黄金三葉虫を出現させる',rw:'神力+2',ok:()=>S.rare,ap:()=>{S.emax=Math.min(9,S.emax+2);}},
  {t:'アノマロカリスを進化させる',rw:'天啓+40%',ok:()=>SP.anomalo.disc,ap:()=>{S.tenkei=clamp(S.tenkei+40);}},
  {t:'5種を共存させる',rw:'神力+2',ok:()=>aliveSpecies().length>=5,ap:()=>{S.emax=Math.min(9,S.emax+2);}},
];
function renderMission(){const m=MISSIONS[S.missionIdx];if(!m){$('mtxt').textContent='全ミッション達成 — 自由に海を育てよう';$('mrw').textContent='';return;}$('mtxt').textContent=m.t;$('mrw').textContent='報酬 '+m.rw;}
function checkMission(){const m=MISSIONS[S.missionIdx];if(!m||!m.ok())return;m.ap();S.missionIdx++;const b=$('missionBar');b.classList.remove('done');void b.offsetWidth;b.classList.add('done');flash('🎯 達成『'+m.t+'』→ '+m.rw,' win');log('<span class="gd">🎯 ミッション達成: '+m.t+'（報酬 '+m.rw+'）</span>','gd');renderMission();}
function hintFor(k){const s=SP[k];if(!s.gate)return '';return (s.gate.g==='light'?'光':'変異圧')+s.gate.t+' ・親'+SP[s.gate.parent].name;}

// === コンボ演出 ===
function comboHit(){S.combo++;clearTimeout(S._comboT);S._comboT=setTimeout(()=>{S.combo=0;},1800);if(S.combo===4)flash('🍴 食物連鎖 x4！',' win');else if(S.combo===7)flash('🔥 捕食の嵐 x7！',' win');}

// === 生命力（崩壊リスク）===
function updateVit(deaths){const sp=aliveSpecies().length,pop=agents.length;let target=sp*16+Math.min(pop,45)*0.6;if(pop<6)target-=25;target=Math.max(0,Math.min(100,target));S.vit+=(target-S.vit)*0.25;S.vit-=deaths*1.5;S.vit=Math.max(0,Math.min(100,S.vit));}
function collapse(){S.collapsing=true;S.tenkei=0;S.vit=30;S.peakSp=0;let n=0;for(const a of [...agents]){if(SP[a.k].refuge)continue;if(Math.random()<0.5){die(a,true);n++;}}$('stage').classList.remove('shake');void $('stage').offsetWidth;$('stage').classList.add('shake');fx('trial');flash('✝ 生態系が崩壊した — 立て直そう',' bad');log('<span class="bd">✝ 生命力が尽き生態系が崩壊（'+n+'体が死滅）</span>','bd');setTimeout(()=>{S.collapsing=false;},1500);}

function paint(){
  $('turn').textContent='ターン '+S.turn;
  $('lightV').textContent=R(S.light);$('lightB').style.width=S.light+'%';
  $('mutV').textContent=R(S.mut);$('mutB').style.width=S.mut+'%';
  $('tkval').textContent=R(S.tenkei)+'%';$('tkbar').style.width=S.tenkei+'%';
  $('burst').classList.toggle('ready',S.tenkei>=100);
  if(S.ironRev){$('ironG').classList.add('live');$('ironName').textContent='鉄分（交絡）';$('ironV').textContent=R(S.iron);$('ironV').style.color='var(--gold)';$('ironB').style.background='var(--gold)';$('ironB').style.width=S.iron+'%';}else{$('ironB').style.width=Math.min(S.iron,28)+'%';}
  {const vc=S.vit>50?'var(--teal)':S.vit>25?'var(--gold)':'var(--coral)';$('vitV').textContent=R(S.vit);$('vitV').style.color=vc;$('vitB').style.width=S.vit+'%';$('vitB').style.background=vc;$('vitG').classList.toggle('danger',S.vit<25);}
  $('zcount').textContent=ORDER.filter(k=>k!=='proto'&&SP[k].disc).length;
  $('eco').textContent='生息 '+aliveSpecies().length+'種 ・ 総個体 '+agents.length;
  $('bless').classList.toggle('no',S.energy<1);$('trial').classList.toggle('no',S.energy<1);
  pipsRender();updateFormula();
}
function updateFormula(){const m=ENVS[S.env];$('formula').innerHTML='<span class="eq">進化圧 = exp(β·曝露·修飾 + 中間因子 + 交絡)</span><br>光エネルギー <b>'+R(S.light)+'</b> ｜ 変異圧 <b>'+R(S.mut)+'</b> ｜ '+(S.ironRev?'鉄分 <b>'+R(S.iron)+'</b> ｜ ':'交絡 <b>?</b> ｜ ')+'環境×'+m.light+' ｜ 神力 '+S.energy+'/'+S.emax+'<br>生息 '+aliveSpecies().length+'種 ・ 総個体 '+agents.length;}
let toastT;function flash(msg,cls){const t=$('toast');t.innerHTML=msg;t.className='toast show'+(cls?' '+cls:'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000);}
function log(html,cls){const l=$('log');const d=document.createElement('div');if(cls)d.className=cls;d.innerHTML='T'+S.turn+'  '+html;l.appendChild(d);l.parentElement.scrollTop=l.parentElement.scrollHeight;while(l.children.length>70)l.removeChild(l.firstChild);}

function spawn(k,x,y,rare){const s=SP[k];const dw=rare?RARE.dw:s.dw,dh=rare?RARE.dh:s.dh,sw=rare?RARE.sw:s.sw,sh=rare?RARE.sh:s.sh,sr=rare?RARE.sr:s.sr,col=rare?RARE.color:s.color;
  const e=document.createElement('span');e.className='crit';e.style.width=dw+'px';e.style.height=dh+'px';
  e.innerHTML='<span class="body"><span class="detail">'+svgFor(k,rare)+'</span></span>';
  const body=e.firstChild;body.classList.add('born');
  const a={k,rare:!!rare,el:e,body,dw,dh,x:x==null?rf(20,WORLD_W-30):x,y:y==null?rf(20,WORLD_H-30):y,head:rf(0,6.28),hp:rare?90:80,age:0,life:rare?60:ri(s.life[0],s.life[1]),eatCd:0,fed:0,target:null,rt:0,zig:Math.random()<.5?1:-1,zt:0};
  e._a=a;e.style.transform='translate('+(a.x-dw/2)+'px,'+(a.y-dh/2)+'px)';$('world').appendChild(e);
  const dsvg=e.querySelector('.detail>svg');if(dsvg){dsvg.setAttribute('width',dw);dsvg.setAttribute('height',dh);}
  agents.push(a);return a;}
function die(a,corpse){const i=agents.indexOf(a);if(i>=0)agents.splice(i,1);if(S.sel===a){clearSel();}if(corpse)addCorpse(a.x,a.y,SP[a.k].sw);a.el.style.transition='opacity .3s';a.el.style.opacity=0;setTimeout(()=>{if(a.el.remove)a.el.remove();},300);}
function addCorpse(x,y,sz){const e=document.createElement('span');e.className='corpse';const w=Math.max(8,sz*0.9);e.style.width=w+'px';e.style.height=Math.max(6,sz*0.6)+'px';e.style.opacity=.5;e.style.transform='translate('+(x-w/2)+'px,'+y+'px)';$('world').appendChild(e);corpses.push({el:e,x,y,ttl:7,w});while(corpses.length>28){const c=corpses.shift();if(c.el.remove)c.el.remove();}}
function nearestPrey(a,preys,sense){let best=null,bd=sense*sense;for(const o of agents){if(o===a)continue;if(!preys.includes(o.k))continue;const dx=o.x-a.x,dy=o.y-a.y,d=dx*dx+dy*dy;if(d<bd){bd=d;best=o;}}return best;}
function nearestCorpse(a,sense){let best=null,bd=sense*sense;for(const o of corpses){const dx=o.x-a.x,dy=o.y-a.y,d=dx*dx+dy*dy;if(d<bd){bd=d;best=o;}}return best;}

function wander(a,s,dt){switch(s.move){
  case 'brownian':a.rt-=dt;if(a.rt<=0){a.head+=rf(-1.5,1.5);a.rt=rf(.2,.55);}break;
  case 'sway':a.rt-=dt;if(a.rt<=0){a.head+=rf(-2.2,2.2);a.rt=rf(.7,1.5);}break;
  case 'zigzag':a.zt-=dt;if(a.zt<=0){a.zig=-a.zig;a.zt=rf(.22,.4);}a.head+=a.zig*2.4*dt;a.rt-=dt;if(a.rt<=0){a.head+=rf(-.8,.8);a.rt=rf(1.2,2.4);}break;
  case 'crawl':a.rt-=dt;if(a.rt<=0){a.head+=rf(-.5,.5);a.rt=rf(1.6,3.2);}break;
  case 'cruise':a.rt-=dt;if(a.rt<=0){a.head+=rf(-.35,.35);a.rt=rf(2.2,4.2);}break;
}}
function moveLoop(now){if(!lastT)lastT=now;let dt=(now-lastT)/1000;lastT=now;if(dt>0.06)dt=0.06;
  for(const a of agents){const s=SP[a.k];a.eatCd-=dt;let speed=s.base;
    if(s.role==='cons'){
      if(a.eatCd>0){speed=s.base*0.5;wander(a,s,dt);}
      else{const t=(s.diet==='detritus')?nearestCorpse(a,s.sense):nearestPrey(a,s.preys,s.sense);
        if(t&&t.el&&t.el.isConnected){const dx=t.x-a.x,dy=t.y-a.y,dist=Math.hypot(dx,dy);a.head=Math.atan2(dy,dx);speed=s.hunt;a.target=t;if(dist<(s.dw*0.45+8)){eat(a,t,s.diet);a.target=null;}}
        else{a.target=null;wander(a,s,dt);}}
    }else{wander(a,s,dt);}
    a.x+=Math.cos(a.head)*speed*dt;a.y+=Math.sin(a.head)*speed*dt;
    if(a.x<8){a.x=8;a.head=Math.PI-a.head;}if(a.x>WORLD_W-20){a.x=WORLD_W-20;a.head=Math.PI-a.head;}
    if(a.y<8){a.y=8;a.head=-a.head;}if(a.y>WORLD_H-20){a.y=WORLD_H-20;a.head=-a.head;}
    let tf='translate('+(a.x-a.dw/2)+'px,'+(a.y-a.dh/2)+'px)';
    if(s.role==='cons'){let deg=a.head*180/Math.PI;tf+=' rotate('+deg+'deg)';if(Math.cos(a.head)<0)tf+=' scale(1,-1)';}
    a.el.style.transform=tf;
  }
  for(const c of [...corpses]){c.ttl-=dt;c.y+=8*dt;c.el.style.transform='translate('+(c.x-c.w/2)+'px,'+c.y+'px)';c.el.style.opacity=Math.max(0,c.ttl/7)*.5;if(c.ttl<=0){const i=corpses.indexOf(c);if(i>=0)corpses.splice(i,1);if(c.el.remove)c.el.remove();}}
  requestAnimationFrame(moveLoop);
}
function eat(pred,prey,diet){pred.hp=Math.min(100,pred.hp+(diet==='detritus'?22:30));pred.fed=2;comboHit();pred.eatCd=rf(.7,1.1);pred.body.classList.remove('munch');void pred.body.offsetWidth;pred.body.classList.add('munch');
  if(diet==='detritus'){const i=corpses.indexOf(prey);if(i>=0)corpses.splice(i,1);if(prey.el.remove)prey.el.remove();}else{die(prey,true);}}

function mediators(){S.light=clamp(S.light*0.97+S.iron*0.04);S.mut=clamp(S.mut*0.96);S.iron=Math.min(100,S.iron*0.97+1.2);if(!S.ironRev&&S.iron>=40){log('<span class="wn">⚠ 未知の寄与を検出（交絡の可能性）</span>','wn');flash('⚠ 未知の寄与を検出');S.iron+=0.001;}if(!S.ironRev&&S.iron>=55){S.ironRev=true;log('<span class="wn">🔍 交絡の正体は [鉄分濃度]。光を陰で底上げしていた</span>','wn');flash('🔍 交絡 [鉄分] を特定',' win');}}
function speciate(){for(const k of ORDER){const s=SP[k];if(!s.gate)continue;
  const gateMet=S[s.gate.g]>=s.gate.t&&countSp(s.gate.parent)>0;if(!gateMet)continue;
  const gname=s.gate.g==='light'?'光':'変異圧';
  const par=agents.find(a=>a.k===s.gate.parent);const px=par?par.x:rf(40,WORLD_W-40),py=par?par.y:rf(40,WORLD_H-40);
  if(!s.disc){
    // 初発見
    s.disc=true;s.ext=false;spawn(k,px,py);spawn(k,px+rf(-30,30),py+rf(-30,30));S.tenkei=clamp(S.tenkei+15);
    flash('✨ '+s.name+' が誕生！',' win');
    log('<span class="gd">✨ '+SP[s.gate.parent].name+' から '+s.name+' が分岐（'+gname+R(S[s.gate.g])+'）</span>','gd');
    if(k==='trilo'&&!S.rare&&Math.random()<0.14){S.rare=true;RARE.disc=true;S.tenkei=clamp(S.tenkei+10);spawn('trilo',px+12,py,true);flash('★ 黄金三葉虫 出現！',' win');log('<span class="wn">★ 黄金三葉虫が低確率出現（形態レア）</span>','wn');}
    renderZukan();
  } else if(countSp(k)===0){
    // 絶滅した種の再進化（条件が再び満たされたら復活）
    s.ext=false;spawn(k,px,py);spawn(k,px+rf(-30,30),py+rf(-30,30));S.tenkei=clamp(S.tenkei+5);
    flash('🔄 '+s.name+' が再進化',' win');
    log('<span class="gd">🔄 '+SP[s.gate.parent].name+' から '+s.name+' が再び現れた（'+gname+R(S[s.gate.g])+'）</span>','gd');
    renderZukan();
  }
}}

function simTick(){
  S.turn++;S.eregen++;if(S.eregen>=2){S.energy=Math.min(S.emax,S.energy+1);S.eregen=0;}
  S.lf=0.30+S.light/140;let deaths=0;
  for(const a of [...agents]){const s=SP[a.k];a.age++;a.fed=Math.max(0,a.fed-1);
    if(s.role==='prod'){if(S.light>28)a.hp=Math.min(100,a.hp+6);else a.hp-=12;}else{a.hp-=8;}
    if(a.age>=a.life||a.hp<=0){die(a,true);deaths++;}}
  for(const a of [...agents]){const s=SP[a.k];
    if(s.role==='prod'){if(S.light>30&&countSp(a.k)<s.cap&&agents.length<GCAP&&Math.random()<0.30*S.lf)spawn(a.k,a.x+rf(-28,28),a.y+rf(-24,24));}
    else{if(a.fed>0&&a.hp>70&&countSp(a.k)<s.cap&&agents.length<GCAP&&Math.random()<0.16){a.hp-=28;spawn(a.k,a.x+rf(-22,22),a.y+rf(-18,18));}}}
  if(countSp('proto')<3)spawn('proto');
  mediators();speciate();
  for(const k of ORDER){const s=SP[k];if(s.disc&&!s.refuge&&!s.ext&&countSp(k)===0){s.ext=true;log('<span class="bd">✝ '+s.name+' が絶滅</span>','bd');flash('✝ '+s.name+' が絶滅',' bad');}if(s.ext&&countSp(k)>0)s.ext=false;}
  if(aliveSpecies().length>=3)S.tenkei=clamp(S.tenkei+1.5);
  const spnow=aliveSpecies().length;
  if(spnow>S.peakSp){S.peakSp=spnow;if(spnow===4){flash('🌊 多様化が進む（4種共存）',' win');}else if(spnow>=5){flash('💥 カンブリア爆発！'+spnow+'種が共存',' win');log('<span class="gd">💥 カンブリア爆発 — '+spnow+'種が共存</span>','gd');}}
  updateVit(deaths);
  const consAlive=ORDER.some(k=>SP[k].role==='cons'&&countSp(k)>0);
  if(!consAlive){S.noCons=(S.noCons||0)+1;}else{S.noCons=0;S.consHint=false;}
  if(S.noCons>=5&&!S.consHint){S.consHint=true;flash('💡 試練で変異圧を上げると捕食者が再進化する',' bad');log('<span class="wn">💡 捕食者が全滅。試練（変異圧↑）で食物網を呼び戻そう</span>','wn');}
  if(S.vit<25&&!S.vitWarn){S.vitWarn=true;flash('⚠ 生命力が危険域 — 多様性を取り戻そう',' bad');log('<span class="wn">⚠ 生命力が危険域に低下</span>','wn');}
  if(S.vit>=40)S.vitWarn=false;
  if(S.vit<20)S.vitLow++;else if(S.vit>=40)S.vitLow=0;
  if((S.vitLow>=6||S.vit<=0)&&!S.collapsing){collapse();S.vitLow=0;}
  checkMission();
  if(cam.mode==='wide')updateGridCounts();
  refreshInspect();renderZukan();paint();
}

function fx(type){const el=$(type==='bless'?'fxBless':'fxTrial');el.classList.remove('go');void el.offsetWidth;el.classList.add('go');}
function bounceAll(cls){for(const a of agents){const b=a.body;b.classList.remove(cls);void b.offsetWidth;b.classList.add(cls);}}
function setSel(a,pin){S.sel=a;if(pin)S.pin=true;document.querySelectorAll('.crit.sel').forEach(x=>x.classList.remove('sel'));a.el.classList.add('sel');refreshInspect();$('inspect').classList.add('show');}
function clearSel(){S.sel=null;S.pin=false;$('inspect').classList.remove('show');document.querySelectorAll('.crit.sel').forEach(x=>x.classList.remove('sel'));}
function refreshInspect(){const a=S.sel;if(!a||!a.el.isConnected){clearSel();return;}const s=SP[a.k];$('iDot').style.background=a.rare?RARE.color:s.color;$('iName').textContent=a.rare?RARE.name:s.name;const hp=Math.max(0,R(a.hp));$('iHp').style.width=hp+'%';$('iHp').style.background=hp>50?'var(--teal)':hp>22?'var(--gold)':'var(--coral)';$('iAge').textContent='齢 '+a.age+' / 寿命 '+a.life;$('iState').textContent=a.age>a.life*0.75?'高齢':(hp<30?'衰弱':((a.fed>0||(s.role==='prod'&&S.light>30))?'満腹':'空腹'));}
function pickAt(clientX,clientY,thr){const rect=$('stage').getBoundingClientRect();const wx=(clientX-rect.left)/cam.scale+cam.ox,wy=(clientY-rect.top)/cam.scale+cam.oy;let best=null,bd=(thr/cam.scale)*(thr/cam.scale);for(const a of agents){const dx=a.x-wx,dy=a.y-wy,d=dx*dx+dy*dy;if(d<bd){bd=d;best=a;}}return best;}

function spend(){if(S.energy<1){flash('神力が足りない（回復待ち）',' bad');return false;}S.energy--;return true;}
function bless(){if(!spend())return;const m=ENVS[S.env].light,add=R(45*m*(1-S.light/100));S.light=clamp(S.light+add);for(const a of agents)if(SP[a.k].role==='prod')a.hp=Math.min(100,a.hp+15);fx('bless');bounceAll('happy');log('恵み(光) → 修飾×'+m+' → 光エネルギー +'+add+(add<8?'（既に十分・効果薄い）':'（生産者が活気づく）'));flash('恵み → 光エネルギー +'+add);speciate();checkMission();refreshInspect();paint();}
function trial(){if(!spend())return;const m=ENVS[S.env].pred,add=R(40*m*(1-S.mut/100));S.mut=clamp(S.mut+add);for(const a of [...agents]){if(SP[a.k].refuge)continue;a.hp-=16;if(a.hp<=0)die(a,true);}fx('trial');$('stage').classList.remove('shake');void $('stage').offsetWidth;$('stage').classList.add('shake');bounceAll('flinch');log('試練 → 修飾×'+m+' → 変異圧 +'+add+'、個体に淘汰圧','bd');flash('試練 → 変異圧 +'+add+'（淘汰圧）',' bad');speciate();checkMission();refreshInspect();paint();}
function burst(){if(S.tenkei<100)return;S.light=clamp(S.light+40);S.mut=clamp(S.mut+40);S.tenkei=0;fx('bless');bounceAll('happy');log('<span class="wn">✦ 天啓発動：光と変異圧を一気に底上げ</span>','wn');flash('✦ 天啓 — 一斉進化を促した',' win');speciate();checkMission();refreshInspect();paint();}

function renderZukan(){const g=$('zgrid');g.innerHTML='';const list=ORDER.filter(k=>k!=='proto').map(k=>({k,s:SP[k]})).concat([{k:'rare',s:RARE}]);for(const it of list){const s=it.s,isRare=(it.k==='rare');const d=document.createElement('div');if(!s.disc){d.className='cell undisc';d.innerHTML='<span class="sil">'+(isRare?svgFor('trilo',true):svgFor(it.k))+'</span><span>？？？</span><span class="hint">'+(isRare?'三葉虫から低確率変異':'条件 '+hintFor(it.k))+'</span>';}else{const n=isRare?(S.rare?1:0):countSp(it.k);d.className='cell'+(isRare?' rare':'')+((!isRare&&s.ext)?' ext':'');d.innerHTML=svgFor(isRare?'trilo':it.k,isRare)+'<span>'+s.name+'</span>'+(isRare?'':'<span class="n">'+((s.ext)?'絶滅':'個体'+n)+'</span>');}g.appendChild(d);}}

$('bless').onclick=bless;$('trial').onclick=trial;$('burst').onclick=burst;
$('camback').onclick=ev=>{ev.stopPropagation();setWide();};
$('iClose').onclick=ev=>{ev.stopPropagation();clearSel();};
$('openLog').onclick=ev=>{ev.stopPropagation();updateFormula();$('logPanel').classList.add('open');};
$('openZukan').onclick=ev=>{ev.stopPropagation();renderZukan();$('zukanPanel').classList.add('open');};
document.querySelectorAll('[data-close]').forEach(x=>x.onclick=()=>x.closest('.panel').classList.remove('open'));
document.querySelectorAll('.panel').forEach(p=>p.onclick=e=>{if(e.target===p)p.classList.remove('open');});
// ドラッグ/スワイプでパン、タップで個体選択、ダブルクリック/ダブルタップで広角へ
let drag={active:false,id:null,sx:0,sy:0,ox:0,oy:0,moved:false},lastTap=0,lastTapX=0,lastTapY=0;
$('stage').addEventListener('pointerdown',e=>{
  if(cam.mode!=='zoom')return;
  if(e.target.closest('button,.inspect'))return;
  drag.active=true;drag.id=e.pointerId;drag.sx=e.clientX;drag.sy=e.clientY;drag.ox=cam.ox;drag.oy=cam.oy;drag.moved=false;
  try{$('stage').setPointerCapture(e.pointerId);}catch(_){}
});
$('stage').addEventListener('pointermove',e=>{
  if(cam.mode!=='zoom')return;
  if(drag.active&&e.pointerId===drag.id){
    const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
    if(!drag.moved&&Math.hypot(dx,dy)>4)drag.moved=true;
    if(drag.moved){if(S.sel&&!S.pin)clearSel();panTo(drag.ox-dx/cam.scale,drag.oy-dy/cam.scale);}
    return;
  }
  if(e.pointerType==='mouse'){const a=pickAt(e.clientX,e.clientY,22);if(a)setSel(a,false);else if(!S.pin)clearSel();}
});
$('stage').addEventListener('pointerup',e=>{
  if(cam.mode!=='zoom'){drag.active=false;return;}
  try{$('stage').releasePointerCapture(e.pointerId);}catch(_){}
  const wasDrag=drag.moved;drag.active=false;
  if(wasDrag)return;
  if(e.target.closest('button,.inspect'))return;
  if(e.pointerType!=='mouse'){
    const now=Date.now();
    if(now-lastTap<300&&Math.hypot(e.clientX-lastTapX,e.clientY-lastTapY)<25){lastTap=0;setWide();return;}
    lastTap=now;lastTapX=e.clientX;lastTapY=e.clientY;
    const a=pickAt(e.clientX,e.clientY,30);if(a)setSel(a,true);else clearSel();
  }else{
    const a=pickAt(e.clientX,e.clientY,30);if(a)setSel(a,true);else if(!S.pin)clearSel();
  }
});
$('stage').addEventListener('pointercancel',()=>{drag.active=false;});
$('stage').addEventListener('pointerleave',e=>{if(e.pointerType==='mouse'&&!S.pin&&!drag.active)clearSel();});
$('stage').addEventListener('dblclick',e=>{if(cam.mode==='zoom'&&!e.target.closest('button,.inspect'))setWide();});
window.addEventListener('resize',()=>{dims();if(cam.mode==='wide')setWide();else{cam.scale=1;cam.ox=clampOx(cam.ox);cam.oy=clampOy(cam.oy);applyCam();}});

dims();buildGrid();setWide();
for(let i=0;i<16;i++)spawn('proto');
renderEnv();renderZukan();renderMission();paint();
log('海が目覚めた。上のミッションを達成して神力を強化しよう。区画をタップで拡大すると生命が泳ぐ様子が見える。');
requestAnimationFrame(moveLoop);
setInterval(simTick,1500);
</script>
